<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fax Academy Pip Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Fax Academy</h1>
    </header>
    <main>
      <form id="forexForm">
        <div class="form-group">
          <label for="currency">Account Currency</label>
          <select id="currency" name="currency">
            <option value="USD">USD</option>
          </select>
        </div>
        <div class="form-group">
          <label for="pair">Forex Pair</label>
          <select id="pair" name="pair">
            <option value="XAUUSD">XAUUSD</option>
            <option value="USDCAD">USDCAD</option>
            <option value="GBPUSD">GBPUSD</option>
            <option value="AUDUSD">AUDUSD</option>
            <option value="NZDJPY">NZDJPY</option>
            <option value="NZDUSD">NZDUSD</option>
            <option value="USDCHF">USDCHF</option>
            <option value="USDCZK">USDCZK</option>
            <option value="USDDKK">USDDKK</option>
            <option value="USDHKD">USDHKD</option>
            <option value="USDHUF">USDHUF</option>
            <option value="USDJPY">USDJPY</option>
            <option value="USDMXN">USDMXN</option>
            <option value="USDNOK">USDNOK</option>
            <option value="USDPLN">USDPLN</option>
            <option value="USDSEK">USDSEK</option>
            <option value="USDSGD">USDSGD</option>
            <option value="USDTRY">USDTRY</option>
            <option value="USDZAR">USDZAR</option>
            <option value="EURNOK">EURNOK</option>
            <option value="EURNZD">EURNZD</option>
            <option value="EURPLN">EURPLN</option>
            <option value="EURSEK">EURSEK</option>
            <option value="EURTRY">EURTRY</option>
            <option value="EURUSD">EURUSD</option>
            <option value="GBPAUD">GBPAUD</option>
            <option value="GBPCAD">GBPCAD</option>
            <option value="GBPCHF">GBPCHF</option>
            <option value="GBPDKK">GBPDKK</option>
            <option value="GBPJPY">GBPJPY</option>
            <option value="GBPNZD">GBPNZD</option>
            <option value="GBPPLN">GBPPLN</option>
            <option value="GBPSEK">GBPSEK</option>
            <option value="GBPUSD">GBPUSD</option>
            <option value="NZDCAD">NZDCAD</option>
            <option value="NZDCHF">NZDCHF</option>
            <option value="AUDCAD">AUDCAD</option>
            <option value="AUDCHF">AUDCHF</option>
            <option value="AUDJPY">AUDJPY</option>
            <option value="AUDNZD">AUDNZD</option>
            <option value="AUDUSD">AUDUSD</option>
            <option value="CADCHF">CADCHF</option>
            <option value="CADJPY">CADJPY</option>
            <option value="CHFJPY">CHFJPY</option>
            <option value="EURAUD">EURAUD</option>
            <option value="EURCAD">EURCAD</option>
            <option value="EURCHF">EURCHF</option>
            <option value="EURDKK">EURDKK</option>
            <option value="EURGBP">EURGBP</option>
            <option value="EURHKD">EURHKD</option>
            <option value="EURJPY">EURJPY</option>
          </select>
        </div>
        <div class="form-group">
          <label for="lotSize">Lot Size</label>
          <input type="number" id="lotSize" name="lotSize" step="0.01" placeholder="e.g., 0.01">
        </div>
        <div class="form-group">
          <label for="entryPrice">Entry Price</label>
          <input type="number" id="entryPrice" name="entryPrice" step="0.01" placeholder="e.g., 2650.00">
        </div>
        <div class="form-group">
          <label for="slPrice">Stop Loss (SL) Price</label>
          <input type="number" id="slPrice" name="slPrice" step="0.01" placeholder="e.g., 2649.00">
        </div>
        <div class="form-group">
          <label for="tpPrice">Take Profit (TP) Price</label>
          <input type="number" id="tpPrice" name="tpPrice" step="0.01" placeholder="e.g., 2651.00">
                    </div>
                    <div class="form-group">
              <label>Trade</label>
              <div class="radio-group">
                <input type="radio" id="buy" name="action" value="Buy" checked>
                <label for="buy" class="radio-option">
                  <span class="label">Buy</span>
                </label>

                <input type="radio" id="sell" name="action" value="Sell">
                <label for="sell" class="radio-option">
                  <span class="label">Sell</span>
                </label>
              </div>
                    </div>
                    <button type="button" id="calculateBtn">Calculate</button>
                  </form>
                  <div id="result">
                    <h2 class="result-title">Results</h2>
                    <div class="result-row">
                      <span class="label">Trade:</span>
                      <span id="actionResult" class="value">-</span>
                    </div>
                    <div class="result-row">
                      <span class="label">Take Profit:</span>
                      <span id="tpResult" class="value">-</span>
                    </div>
                    <div class="result-row">
                      <span class="label">Stop Loss:</span>
                      <span id="slResult" class="value">-</span>
                    </div>
                  </div>
                </main>
                  <footer>
      <p style="color: #7289DA; border: none; text-decoration: none;">
        Powered by <a href="https://yourlink.com" target="_blank" style="color: #7289DA; text-decoration: none;">Fax Academy</a>
      </p>
    </footer>
    </div>

    <script src="script.js"></script>
    </body>
    </html>
